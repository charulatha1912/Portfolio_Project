# render.yaml - Render deployment configuration
# This file tells Render how to deploy your Flask backend.
# Push this file to your GitHub repo, then connect it on Render.

services:
  - type: web
    name: sarah-portfolio-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        sync: false         # Set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false         # Set this to your Vercel URL
      - key: FLASK_DEBUG
        value: "False"      # Always False in production
